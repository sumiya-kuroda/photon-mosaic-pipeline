name: Sync fork with upstream

on:
  schedule:
    - cron: '0 3 * * *'  # runs daily at 3am UTC — adjust as you like
  workflow_dispatch:      # lets you trigger it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout your fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config merge.ours.driver true

      - name: Add upstream remote
        run: git remote add upstream https://github.com/photon-mosaic/photon-mosaic-pipeline.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream changes (keeping our README)
        run: |
          git merge upstream/main --no-edit || {
            echo "Merge had conflicts, resolving README in our favor..."
            git checkout --ours README.md
            git add README.md
            git commit --no-edit
          }

      - name: Push changes
        run: git push origin main